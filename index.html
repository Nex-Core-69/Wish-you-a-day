<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#000,#061b4d,#0d6efd);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:rgba(255,255,255,.08);
    padding:35px;
    border-radius:20px;
    text-align:center;
    backdrop-filter:blur(12px);
    box-shadow:0 0 25px rgba(0,140,255,.5);
    width:90%;
    max-width:350px;
}

h2{
    margin-bottom:20px;
}

#ip{
    font-size:28px;
    font-weight:bold;
    color:#4db8ff;
    margin:20px 0;
    word-break:break-word;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:10px;
    background:#0d6efd;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#3399ff;
}
</style>
</head>
<body>

<div class="card">
    <h2>Your IP is</h2>
    <div id="ip"></div>

    <button onclick="shareIP()">Click to Share</button>
</div>

<script>
function randomIP(){
    return `${Math.floor(Math.random()*223)+1}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}`;
}

const fakeIP = randomIP();
document.getElementById("ip").textContent = fakeIP;

function shareIP(){
    const text = "Your IP is: " + fakeIP;

    if(navigator.share){
        navigator.share({
            title:"Your IP",
            text:text
        });
    }else{
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }
}
</script>

</body>
</html>
